version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  bot:
    build: .
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://app:app@db:5432/app}
      DATA_JSON_PATH: ${DATA_JSON_PATH:-/app/data/videos.json}
      LLM_ENABLED: ${LLM_ENABLED:-true}
      GIGACHAT_MODEL: ${GIGACHAT_MODEL:-GigaChat-2}
    volumes:
      - ./data:/app/data:ro
    restart: unless-stopped

volumes:
  pgdata:
